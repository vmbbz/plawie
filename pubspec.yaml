name: clawa
description: Clawa Pocket AI Gateway for Android - standalone AI assistant.
publish_to: 'none'
version: 1.7.2+9

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.4.0
  dio: ^5.4.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0
  web_socket_channel: ^3.0.0
  cryptography: ^2.7.0
  google_fonts: ^6.1.0
  flutter_markdown: ^0.7.3+1
  uuid: ^4.2.0
  geolocator: ^12.0.0
  camera: ^0.11.0

  # Crypto Payment Integration
  flutter_secure_storage: ^9.0.0
  solana: ^0.31.2
  solana_mobile_client: ^0.1.2
  bs58: ^1.0.2
  logger: ^2.0.2+1
  
  # Phase 2: Advanced Features
  # Memory System
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Skills System
  yaml: ^3.1.2
  archive: ^3.4.0
  crypto: ^3.0.3
  
  # Natural Scheduling
  cron: ^0.6.2
  
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  
  # Phase 3: Native Solana Integration
  # Jupiter API Integration
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # Additional Solana utilities
  decimal: ^2.3.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bionic_bypass.js
    - assets/proot/
    - assets/resolv.conf
    - assets/ic_launcher.png
    - assets/app_icon_official.svg
    - assets/avatar_static.svg
    - assets/vrm/
    - assets/vrm/animations/
    - assets/vrm/lib/
    - assets/vrm/utils/
    - assets/openclaw/skills/battery.md
    - assets/openclaw/skills/vibrate.md
    - assets/openclaw/skills/sensors.md
  fonts:
    - family: DejaVuSansMono
      fonts:
        - asset: assets/fonts/DejaVuSansMono.ttf
        - asset: assets/fonts/DejaVuSansMono-Bold.ttf
          weight: 700
