<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:;">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clawa VRM</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0 auto;
        }
    </style>
    <script>
        // esmsInitOptions MUST be set before es-module-shims loads.
        // Without shimMode: true, the polyfill may skip importmap processing on older Android WebViews.
        window.esmsInitOptions = { shimMode: true };
    </script>
    <!-- IMPORTANT: No 'async' here — must be synchronous so importmap is processed before type=module -->
    <script src="./lib/es-module-shims.js"></script>
    <script type="importmap-shim">
    {
        "imports": {
            "three": "./lib/three.module.js",
            "three/addons/": "./lib/",
            "@pixiv/three-vrm": "./lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "./lib/three-vrm-animation.module.js"
        }
    }
    </script>
</head>

<body>
    <script>
        // Intercept global errors to bubble up to Flutter for diagnostics!
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const errorMsg = 'ERROR: ' + msg + ' @ ' + url + ':' + lineNo + ':' + columnNo;
            console.error(errorMsg);
            if (window.ClawaBridge) {
                window.ClawaBridge.postMessage(errorMsg);
            }
            return false;
        };

        // Also catch unhandled promise rejections
        window.addEventListener('unhandledrejection', function (event) {
            const msg = 'ERROR (Promise): ' + (event.reason ? event.reason.toString() : 'Unknown rejection');
            console.error(msg);
            if (window.ClawaBridge) {
                window.ClawaBridge.postMessage(msg);
            }
        });

        // Early probe to confirm Bridge is active
        (function () {
            const probe = () => {
                if (window.ClawaBridge) {
                    window.ClawaBridge.postMessage('LOG: [JS] Bridge Probe Successful');
                } else {
                    setTimeout(probe, 100);
                }
            };
            probe();
        })();
    </script>
    <script type="module-shim">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';
        import { createVRMAnimationClip, VRMAnimationLoaderPlugin } from '@pixiv/three-vrm-animation';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0.0, 1.45, 1.6);
        camera.lookAt(0, 1.3, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));



        let currentVrm = null;
        let mixer = null;
        let idleAction = null;
        let talkAction = null;
        let currentAction = null;

        let speechIntensity = 0.0;
        let isSpeaking = false;
        let mouthTime = 0.0;
        let isThinking = false;

        let targetCameraZ = 1.6;
        let currentCameraZ = 1.6;

        window.loadVrmAvatar = (avatarFileName) => {
            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Starting load of ' + avatarFileName);

            const loader = new GLTFLoader();
            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Registering VRM Plugins...');
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            loader.load('./' + avatarFileName,
                (gltf) => {
                    if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] ' + avatarFileName + ' loaded successfully');

                    if (currentVrm) {
                        scene.remove(currentVrm.scene);
                        currentVrm.dispose();
                    }

                    const vrm = gltf.userData.vrm;
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

                    // Standardize Position and Scale by Bounding Box (AF Spec)
                    // We lock the root bone position explicitly to X=0 and Z=0.
                    // This is VITAL because asymmetrical avatars (e.g. holding a sword, large cape)
                    // have skewed overall bounding-boxes. Using the bounding-box center pushes them off-center.
                    vrm.scene.position.set(0, 0, 0); 
                    
                    // Force coordinate matrices to update so bone positions are instantly mathematically accurate
                    vrm.scene.updateMatrixWorld(true);

                    // --- PURE aiDreams6Nov CENTERING ENGINE ---
                    // By user request, we revert to the highly successful Volumetric Bounding Box centering 
                    // paradigm used in aiDreams. This perfectly centers the mesh's geometric mass.
                    const box = new THREE.Box3().setFromObject(vrm.scene);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    
                    // 1. Mathematically shift the entire mesh so its volumetric center sits EXACTLY at (0,0,0) world coordinates.
                    vrm.scene.position.sub(center);
                    vrm.scene.updateMatrixWorld(true);

                    // 2. Head-bone validation for height (fallback to mesh height if needed)
                    const head = vrm.humanoid.getNormalizedBoneNode('head');
                    const headPos = new THREE.Vector3();
                    if (head) head.getWorldPosition(headPos);

                    const trueHeight = head ? (headPos.y + (size.y / 2)) * 1.1 : size.y;
                    const trueWidth = size.x;

                    // 3. Since the avatar's volumetric center is exactly (0,0,0), the camera should 
                    // look dead at the origin, with a slight Y tilt for face framing.
                    const cameraLookY = trueHeight / 6.0; // Look slightly above center mass
                    
                    avatarMetrics = { 
                        height: trueHeight, 
                        width: trueWidth, 
                        centerX: 0, 
                        cameraY: cameraLookY 
                    };
                    
                    // 4. Instantly snap to the exact bounds
                    updateCameraFraming(document.body.clientWidth, document.body.clientHeight);
                    currentCameraZ = targetCameraZ; 
                    camera.position.z = currentCameraZ;

                    mixer = new THREE.AnimationMixer(vrm.scene);

                    // Load VRMA Animations sequentially
                    if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: Loading VRMA animations...');
                    loader.load('./animations/idle_loop.vrma', (vrmaGltf) => {
                        const vrmAnimation = vrmaGltf.userData.vrmAnimations[0];
                        const clip = createVRMAnimationClip(vrmAnimation, vrm);
                        idleAction = mixer.clipAction(clip);
                        idleAction.play();
                        currentAction = idleAction;

                        loader.load('./animations/gesture_elegant.vrma', (talkGltf) => {
                            const talkAnim = talkGltf.userData.vrmAnimations[0];
                            const tClip = createVRMAnimationClip(talkAnim, vrm);
                            talkAction = mixer.clipAction(tClip);
                            talkAction.setLoop(THREE.LoopRepeat); // Important so talking repeats!
                            isThinking = false;

                            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: VRMA setup complete');
                        }, undefined, (err) => {
                            if (window.ClawaBridge) window.ClawaBridge.postMessage('ERROR: gesture_elegant failed: ' + err);
                        });
                    }, undefined, (err) => {
                        if (window.ClawaBridge) window.ClawaBridge.postMessage('ERROR: idle_loop failed: ' + err);
                    });
                },
                (progress) => {
                    if (window.ClawaBridge && progress.total > 0) {
                        const percent = (progress.loaded / progress.total * 100).toFixed(1);
                        window.ClawaBridge.postMessage('LOG: [JS] Loading ' + avatarFileName + ': ' + percent + '%');
                        window.ClawaBridge.postMessage('PROGRESS:' + (progress.loaded / progress.total));
                    }
                },
                (err) => {
                    console.error(err);
                    if (window.ClawaBridge) window.ClawaBridge.postMessage('ERROR: [JS] loading ' + avatarFileName + ': ' + err);
                }
            );
        };

        // Signal flutter bridge that the static JS engine is online and ready
        if (window.ClawaBridge) window.ClawaBridge.postMessage('READY');

        const clock = new THREE.Clock();

        window.setSpeechIntensity = (intensity) => {
            speechIntensity = intensity;
            isSpeaking = intensity > 0.1;
            // No longer crossfading full animations to keep head steady
            // We stay in idle loop and use expressionManager for lips/expressions
        };

        window.setThinking = (thinking) => {
            isThinking = thinking;
            // Smoothly blend thinking expression
            if (currentVrm && currentVrm.expressionManager) {
                const target = thinking ? 0.6 : 0.0;
                // We will lerp this in the animate loop
            }
        };

        window.setCinematicMode = (active) => {
            // Disabled: Let the dynamic fov-math strictly dictate zoom based on device screen.
            // Previous logic hardcoded targetCameraZ = 1.2, which caused massive layout jumps!
        };

        window.setGlowIntensity = (intensity) => {
            // Future VFX
        };

        // --- Dynamic FOV Responsive Engine ---
        let avatarMetrics = { height: 1.5, width: 0.8, centerX: -0.15, cameraY: 0.75 };

        // === PHASE 10: INTERACTIVE GAZE + FULL AIRI MATRIX ===
        let gazeTarget = new THREE.Vector3(0, 1.3, 0);

        window.setTapTarget = (screenX, screenY) => {
          const rect = renderer.domElement.getBoundingClientRect();
          const x = ((screenX - rect.left) / rect.width) * 2 - 1;
          const y = -((screenY - rect.top) / rect.height) * 2 + 1;
          const vector = new THREE.Vector3(x, y, 0.5).unproject(camera);
          gazeTarget.copy(vector);
          if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Tap gaze target updated');
        };
        
        function updateCameraFraming(containerWidth, containerHeight) {
            if (!containerWidth || !containerHeight) return;
            
            camera.aspect = containerWidth / containerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(containerWidth, containerHeight, false); 
            
            // PHASE 10: Overlay bust shot
            const isOverlayMode = window.location.search.includes('overlay');
            const targetHeight = isOverlayMode 
                ? avatarMetrics.height * 0.35   // tight floating-bubble framing
                : avatarMetrics.height * 0.55;
            
            const fovRadians = camera.fov * (Math.PI / 180) / 2;
            let dist = (targetHeight / 2) / Math.tan(fovRadians);
            
            if (camera.aspect < 0.6) {
                const targetWidth = avatarMetrics.width;
                const distW = (targetWidth / 2) / Math.tan(fovRadians) / camera.aspect;
                dist = Math.max(dist, distW);
            }
            
            targetCameraZ = dist;
            camera.position.set(avatarMetrics.centerX, avatarMetrics.cameraY, targetCameraZ);
            camera.lookAt(avatarMetrics.centerX, avatarMetrics.cameraY, 0);
        }

        let lastHeight = 0;
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const w = entry.contentRect.width;
                const h = entry.contentRect.height;
                // Ignore height shifts less than 100px to avoid jumping when keyboard opens
                if (Math.abs(h - lastHeight) > 100 || lastHeight === 0) {
                    updateCameraFraming(w, h);
                    lastHeight = h;
                }
            }
        });
        resizeObserver.observe(document.body);

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVrm) {
                if (mixer) mixer.update(delta);

                currentCameraZ = THREE.MathUtils.lerp(currentCameraZ, targetCameraZ, delta * 3.0);
                camera.position.z = currentCameraZ;

                const time = clock.elapsedTime;

                const head = currentVrm.humanoid.getNormalizedBoneNode('head');
                const neck = currentVrm.humanoid.getNormalizedBoneNode('neck');
                const upperChest = currentVrm.humanoid.getNormalizedBoneNode('upperChest');
                const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');

                // === FULL AIRI PROCEDURAL MATRIX (Phase 10) ===
                // Breathing
                const breathe = Math.sin(time * 1.2) * 0.008;
                if (upperChest) upperChest.rotation.x = breathe;
                if (spine) spine.rotation.x = breathe * 0.6;

                // Idle micro-saccades (only when calm)
                if (!isThinking && speechIntensity < 0.1 && head && neck) {
                    head.rotation.y += Math.sin(time * 2.3) * 0.003;
                    neck.rotation.y += Math.cos(time * 1.7) * 0.002;
                }

                // Gaze look-at (now working — sign already fixed in Phase 9)
                if (head) {
                    const lookDir = gazeTarget.clone().sub(head.getWorldPosition(new THREE.Vector3()));
                    const targetRot = new THREE.Euler().setFromQuaternion(
                        new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,-1), lookDir.normalize())
                    );
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, -targetRot.y, delta * 8);
                    head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetRot.x * 0.6, delta * 6);
                }

                // Subtle thinking sway (additive, very small)
                if (isThinking) {
                    if (head) {
                        head.rotation.z += Math.sin(time * 1.5) * 0.005; 
                        head.rotation.x += Math.sin(time * 0.8) * 0.005;
                    }
                }

                // Blinking
                const blinkPeriod = Math.sin(time * 2.5) + Math.sin(time * 3.1);
                const blinkState = blinkPeriod > 1.85 ? 1.0 : 0.0;
                currentVrm.expressionManager.setValue('blink', blinkState);

                // Expanded VRM Visemes for factual speech
                const visemes = ['aa', 'ih', 'ee', 'oh', 'ou'];
                const names = Object.keys(currentVrm.expressionManager.expressionMap);
                const availableVisemes = visemes.filter(v => names.includes(v));

                if (speechIntensity > 0) {
                    mouthTime += delta;
                    const osc = (Math.sin(mouthTime * 10 * Math.PI) + 1) / 2;
                    const intensity = (0.3 + 0.7 * osc) * speechIntensity;

                    if (availableVisemes.length > 0) {
                        const idx = Math.floor((mouthTime * 1000) / 150) % availableVisemes.length;
                        const currentViseme = availableVisemes[idx];

                        for (const v of availableVisemes) {
                            const target = v === currentViseme ? intensity : 0;
                            const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                            currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, target, 0.4));
                        }
                    } else if (names.includes('mouthOpen')) {
                        currentVrm.expressionManager.setValue('mouthOpen', intensity);
                    }
                    
                    // Reduce neutral expression when talking
                    if (names.includes('neutral')) {
                        const cur = currentVrm.expressionManager.getValue('neutral');
                        currentVrm.expressionManager.setValue('neutral', THREE.MathUtils.lerp(cur, 0, 0.2));
                    }
                } else {
                    mouthTime = 0.0;
                    for (const v of visemes) {
                        const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                        if (currentVal > 0) {
                            currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, 0, 0.2));
                        }
                    }
                    if (names.includes('mouthOpen')) {
                        const cur = currentVrm.expressionManager.getValue('mouthOpen');
                        currentVrm.expressionManager.setValue('mouthOpen', THREE.MathUtils.lerp(cur, 0, 0.2));
                    }

                    // Blend in thinking expression or neutral
                    if (isThinking && names.includes('surprised')) { // Surprised as a proxy for 'thinking'
                         const cur = currentVrm.expressionManager.getValue('surprised');
                         currentVrm.expressionManager.setValue('surprised', THREE.MathUtils.lerp(cur, 0.3, 0.1));
                    } else if (names.includes('surprised')) {
                         const cur = currentVrm.expressionManager.getValue('surprised');
                         currentVrm.expressionManager.setValue('surprised', THREE.MathUtils.lerp(cur, 0, 0.1));
                    }

                    if (names.includes('neutral')) {
                        const target = isThinking ? 0.5 : 1.0;
                        const cur = currentVrm.expressionManager.getValue('neutral');
                        currentVrm.expressionManager.setValue('neutral', THREE.MathUtils.lerp(cur, target, 0.1));
                    }
                }

                currentVrm.update(delta);
            }

            renderer.render(scene, camera);
        }

        animate();

        // Resize events are now handled by the bulletproof ResizeObserver bounding-box engine above.
    </script>
</body>

</html>
