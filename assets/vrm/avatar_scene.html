<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clawa VRM</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
    <script async src="./lib/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "./lib/three.module.js",
            "three/addons/": "./lib/",
            "@pixiv/three-vrm": "./lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "./lib/three-vrm-animation.module.js"
        }
    }
    </script>
</head>

<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';
        import { createVRMAnimationClip, VRMAnimationLoaderPlugin } from '@pixiv/three-vrm-animation';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0.0, 1.35, 2.2);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        let currentVrm = null;
        let mixer = null;
        let idleAction = null;
        let talkAction = null;
        let currentAction = null;

        let speechIntensity = 0.0;
        let isThinking = false;
        let isSpeaking = false;
        let mouthTime = 0.0;

        window.loadVrmModel = (modelFileName) => {
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            loader.load('./' + modelFileName,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

                    mixer = new THREE.AnimationMixer(vrm.scene);

                    // Load VRMA Animations sequentially
                    loader.load('./animations/idle_loop.vrma', (vrmaGltf) => {
                        const vrmAnimation = vrmaGltf.userData.vrmAnimations[0];
                        const clip = createVRMAnimationClip(vrmAnimation, vrm);
                        idleAction = mixer.clipAction(clip);
                        idleAction.play();
                        currentAction = idleAction;

                        loader.load('./animations/gesture_elegant.vrma', (talkGltf) => {
                            const talkAnim = talkGltf.userData.vrmAnimations[0];
                            const tClip = createVRMAnimationClip(talkAnim, vrm);
                            talkAction = mixer.clipAction(tClip);
                            talkAction.setLoop(THREE.LoopRepeat);
                            isThinking = false; // Reset just in case
                        });
                    });
                },
                (progress) => {
                    if (window.ClawaBridge && progress.total > 0) {
                        window.ClawaBridge.postMessage('PROGRESS:' + (progress.loaded / progress.total));
                    }
                },
                (err) => console.error(err)
            );
        };

        // Signal flutter bridge that the static JS engine is online and ready
        if (window.ClawaBridge) window.ClawaBridge.postMessage('READY');

        const clock = new THREE.Clock();

        window.setSpeechIntensity = (intensity) => {
            speechIntensity = intensity;
            const wasSpeaking = isSpeaking;
            isSpeaking = intensity > 0.1;

            if (isSpeaking && !wasSpeaking && talkAction) {
                // Crossfade to talking animation
                talkAction.reset();
                talkAction.play();
                idleAction.crossFadeTo(talkAction, 0.3, true);
                currentAction = talkAction;
            } else if (!isSpeaking && wasSpeaking && idleAction) {
                // Crossfade back to idle animation
                idleAction.reset();
                idleAction.play();
                talkAction.crossFadeTo(idleAction, 0.5, true);
                currentAction = idleAction;
            }
        };

        window.setThinking = (thinking) => {
            isThinking = thinking;
        };

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVrm) {
                if (mixer) mixer.update(delta);

                const time = clock.elapsedTime;

                // Keep the head sway for thinking state since VRMA animations just loop
                if (isThinking) {
                    const head = currentVrm.humanoid.getNormalizedBoneNode('head');
                    if (head) {
                        // Blend additive thinking motion on top of base animation
                        head.rotation.z += Math.sin(time * 2.0) * 0.02 + 0.02;
                        head.rotation.x += Math.sin(time) * 0.02 + 0.02;
                    }
                }

                // Blinking logic
                const blinkPeriod = Math.sin(time * 2.5) + Math.sin(time * 3.1);
                const blinkState = blinkPeriod > 1.85 ? 1.0 : 0.0;
                currentVrm.expressionManager.setValue('blink', blinkState);

                // Advanced Lip sync with 8Hz oscillation and lerp from speech intensity
                const visemes = ['aa', 'ih', 'ou'];
                if (speechIntensity > 0) {
                    mouthTime += delta;
                    // Create an 8Hz oscillation wave (0 to 1)
                    const osc = (Math.sin(mouthTime * 8 * Math.PI) + 1) / 2;
                    // Scale by speech intensity for dynamic envelope bounds
                    const intensity = (0.2 + 0.8 * osc) * speechIntensity;

                    // Cycle through vowels
                    const idx = Math.floor((mouthTime * 1000) / 180) % visemes.length;
                    const currentViseme = visemes[idx];

                    for (const v of visemes) {
                        const target = v === currentViseme ? intensity : 0;
                        const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                        // Smoothly lerp towards the target
                        currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, target, 0.4));
                    }
                    currentVrm.expressionManager.setValue('neutral', 0);
                } else {
                    mouthTime = 0.0; // Reset
                    for (const v of visemes) {
                        const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                        if (currentVal > 0) {
                            currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, 0, 0.2));
                        }
                    }
                    if (!isThinking) currentVrm.expressionManager.setValue('neutral', 1.0);
                }

                currentVrm.update(delta);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
