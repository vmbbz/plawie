<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:;">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clawa VRM</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0 auto;
        }
    </style>
    <script>
        // esmsInitOptions MUST be set before es-module-shims loads.
        window.esmsInitOptions = { shimMode: true };
    </script>
    <script src="./lib/es-module-shims.js"></script>
    <script type="importmap-shim">
    {
        "imports": {
            "three": "./lib/three.module.js",
            "three/addons/": "./lib/",
            "@pixiv/three-vrm": "./lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "./lib/three-vrm-animation.module.js"
        }
    }
    </script>
</head>

<body>
    <script>
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const errorMsg = 'ERROR: ' + msg + ' @ ' + url + ':' + lineNo + ':' + columnNo;
            console.error(errorMsg);
            if (window.PlawieBridge) {
                window.PlawieBridge.postMessage(errorMsg);
            }
            return false;
        };

        window.addEventListener('unhandledrejection', function (event) {
            const msg = 'ERROR (Promise): ' + (event.reason ? event.reason.toString() : 'Unknown rejection');
            console.error(msg);
            if (window.PlawieBridge) {
                window.PlawieBridge.postMessage(msg);
            }
        });

        (function () {
            const probe = () => {
                if (window.PlawieBridge) {
                    window.PlawieBridge.postMessage('LOG: [JS] Bridge Probe Successful');
                } else {
                    setTimeout(probe, 100);
                }
            };
            probe();
        })();
    </script>
    <script type="module-shim">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';
        import { createVRMAnimationClip, VRMAnimationLoaderPlugin } from '@pixiv/three-vrm-animation';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0.0, 1.45, 1.5);
        camera.lookAt(0, 1.3, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- NEUTRAL LIGHTING (Removes heavy shadows/cast) ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const simpleLight = new THREE.DirectionalLight(0xffffff, 0.3);
        simpleLight.position.set(1.0, 2.0, 3.0);
        scene.add(simpleLight);

        let currentVrm = null;
        let mixer = null;
        let idleAction = null;
        let currentAction = null;
        
        const gestures = {};
        const GESTURE_PATHS = [
            'dance_picatrix', 'gesture_cute', 'gesture_dance', 'gesture_elegant',
            'gesture_fight', 'gesture_greeting', 'gesture_peacesign', 'gesture_pose',
            'gesture_powerful', 'gesture_ready', 'gesture_shoot', 'gesture_spin',
            'gesture_squat', 'gesture_talk'
        ];

        let speechIntensity = 0.0;
        let isSpeaking = false;
        let mouthTime = 0.0;
        let isThinking = false;
        let targetEmotion = 'neutral';

        let targetCameraZ = 1.6;
        let currentCameraZ = 1.6;

        window.loadVrmAvatar = (avatarFileName) => {
            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Starting load of ' + avatarFileName);

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            loader.load('./' + avatarFileName,
                (gltf) => {
                    if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] ' + avatarFileName + ' loaded successfully');

                    if (currentVrm) {
                        scene.remove(currentVrm.scene);
                        currentVrm.dispose();
                    }

                    const vrm = gltf.userData.vrm;
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

                    vrm.scene.position.set(0, 0, 0); 
                    vrm.scene.updateMatrixWorld(true);

                    // --- PURE aiDreams6Nov CENTERING ENGINE ---
                    const box = new THREE.Box3().setFromObject(vrm.scene);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    
                    vrm.scene.position.sub(center);
                    vrm.scene.updateMatrixWorld(true);

                    const head = vrm.humanoid.getNormalizedBoneNode('head');
                    const headPos = new THREE.Vector3();
                    if (head) head.getWorldPosition(headPos);

                    const trueHeight = head ? (headPos.y + (size.y / 2)) * 1.1 : size.y;
                    const trueWidth = size.x;
                    
                    avatarMetrics = { 
                        height: trueHeight, 
                        width: trueWidth, 
                        centerX: -0.15,
                        headY: head ? headPos.y : 1.45 
                    };
                    
                    // Diagnostic: log which mouth expressions this VRM supports.
                    // If neither visemes (aa/ih/ee/oh/ou) nor mouthOpen exist,
                    // mouth animation will silently do nothing — this log helps debug.
                    if (vrm.expressionManager) {
                        const exprNames = Object.keys(vrm.expressionManager.expressionMap);
                        const hasVisemes = ['aa','ih','ee','oh','ou'].some(v => exprNames.includes(v));
                        const hasMouthOpen = exprNames.includes('mouthOpen');
                        const mouthLog = hasVisemes
                            ? 'VRM mouth: visemes available (' + ['aa','ih','ee','oh','ou'].filter(v => exprNames.includes(v)).join(',') + ')'
                            : hasMouthOpen ? 'VRM mouth: mouthOpen only (no visemes)'
                            : 'VRM mouth: WARN — no visemes or mouthOpen, mouth animation disabled';
                        if (window.PlawieBridge) window.PlawieBridge.postMessage('LOG: [JS] ' + mouthLog);
                    }

                    updateCameraFraming(document.body.clientWidth, document.body.clientHeight);
                    currentCameraZ = targetCameraZ;
                    camera.position.z = currentCameraZ;

                    mixer = new THREE.AnimationMixer(vrm.scene);

                    loader.load('./animations/idle_loop.vrma', (vrmaGltf) => {
                        const vrmAnimation = vrmaGltf.userData.vrmAnimations[0];
                        const clip = createVRMAnimationClip(vrmAnimation, vrm);
                        idleAction = mixer.clipAction(clip);
                        idleAction.play();
                        currentAction = idleAction;

                        GESTURE_PATHS.forEach(name => {
                            loader.load(`./animations/${name}.vrma`, (g) => {
                                const anim = g.userData.vrmAnimations[0];
                                const clip = createVRMAnimationClip(anim, vrm);
                                const action = mixer.clipAction(clip);
                                action.setLoop(THREE.LoopOnce);
                                action.clampWhenFinished = true;
                                gestures[name] = action;
                                if (name.startsWith('gesture_')) {
                                    gestures[name.replace('gesture_', '')] = action;
                                } else if (name === 'dance_picatrix') {
                                    gestures['dance'] = action;
                                }
                            });
                        });
                    });
                },
                (progress) => {
                    if (window.PlawieBridge && progress.total > 0) {
                        window.PlawieBridge.postMessage('PROGRESS:' + (progress.loaded / progress.total));
                    }
                },
                (err) => {
                    console.error(err);
                    if (window.PlawieBridge) window.PlawieBridge.postMessage('ERROR: [JS] ' + err);
                }
            );
        };

        // Poll for PlawieBridge before sending READY — matches the probe pattern above.
        // A one-shot check can miss the bridge if Android WebView injects it after
        // this module runs, causing _isReady to never become true in Dart and
        // leaving setSpeechIntensity uncalled (mouth never moves).
        (function sendReady() {
            if (window.PlawieBridge) {
                window.PlawieBridge.postMessage('READY');
            } else {
                setTimeout(sendReady, 50);
            }
        })();
        
        // --- NEW: Sparkle Manager (Fireworks Effect) ---
        class SparkleManager {
            constructor(scene) {
                this.scene = scene;
                this.maxParticles = 5000;
                this.particles = [];
                
                this.geometry = new THREE.BufferGeometry();
                this.posBuffer = new Float32Array(this.maxParticles * 3);
                this.colBuffer = new Float32Array(this.maxParticles * 3);
                
                this.geometry.setAttribute('position', new THREE.BufferAttribute(this.posBuffer, 3));
                this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colBuffer, 3));
                
                this.material = new THREE.PointsMaterial({
                    size: 0.08, // Doubled for visual punch
                    vertexColors: true,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    sizeAttenuation: true
                });
                
                this.points = new THREE.Points(this.geometry, this.material);
                this.points.frustumCulled = false; // Always render if manager is active
                this.scene.add(this.points);
            }

            spawn(screenX, screenY) {
                const vector = new THREE.Vector3(
                    (screenX / window.innerWidth) * 2 - 1,
                    -(screenY / window.innerHeight) * 2 + 1,
                    0.5
                );
                vector.unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                
                // Project onto z=0 plane
                const distance = -camera.position.z / dir.z;
                const pos = camera.position.clone().add(dir.multiplyScalar(distance));

                if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] SparkleManager spawning particles at ' + pos.x.toFixed(2) + ',' + pos.y.toFixed(2));
                
                for (let i = 0; i < 100; i++) {
                    const color = new THREE.Color().setHSL(Math.random(), 0.9, 0.6);
                    this.particles.push({
                        pos: pos.clone(),
                        vel: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.15,
                            (Math.random() - 0.2) * 0.18,
                            (Math.random() - 0.5) * 0.15
                        ),
                        life: 1.0,
                        decay: 0.005 + Math.random() * 0.01 // Lasts longer
                    });
                    this.particles[this.particles.length - 1].color = color;
                }
                
                // Cap particles
                if (this.particles.length > this.maxParticles) {
                    this.particles = this.particles.slice(-this.maxParticles);
                }
            }

            update(delta) {
                const dt = delta * 60;
                let activeCount = 0;

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.pos.add(p.vel.clone().multiplyScalar(dt));
                    p.vel.y -= 0.005 * dt; // Gravity
                    p.life -= p.decay * dt;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                        continue;
                    }
                    
                    if (activeCount < this.maxParticles) {
                        const idx = activeCount * 3;
                        this.posBuffer[idx] = p.pos.x;
                        this.posBuffer[idx + 1] = p.pos.y;
                        this.posBuffer[idx + 2] = p.pos.z;
                        
                        // Fade in and out
                        const alpha = Math.min(1.0, p.life * 2.5);
                        this.colBuffer[idx] = p.color.r * alpha;
                        this.colBuffer[idx + 1] = p.color.g * alpha;
                        this.colBuffer[idx + 2] = p.color.b * alpha;
                        activeCount++;
                    }
                }
                
                this.geometry.attributes.position.needsUpdate = true;
                this.geometry.attributes.color.needsUpdate = true;
                this.geometry.setDrawRange(0, activeCount);
            }
        }
        window.SparkleManager = new SparkleManager(scene);

        const clock = new THREE.Clock();

        window.setSpeechIntensity = (intensity) => {
            speechIntensity = intensity;
            const wasSpeaking = isSpeaking;
            isSpeaking = intensity > 0.1;
            
            // Handle talking gesture lifecycle
            if (isSpeaking && !wasSpeaking) {
                // Started speaking: trigger talk gesture
                if (gestures['talk'] && currentAction !== gestures['talk']) {
                    window.playGesture('talk');
                }
            } else if (!isSpeaking && wasSpeaking) {
                // Stopped speaking: fade out talk gesture if it was looping
                if (currentAction === gestures['talk'] && idleAction) {
                    idleAction.reset().fadeIn(0.5).play();
                    currentAction.fadeOut(0.5);
                    currentAction = idleAction;
                }
            }
        };

        window.setThinking = (thinking) => {
            isThinking = thinking;
        };

        window.setCinematicMode = (active) => {};
        window.setGlowIntensity = (intensity) => {};
        
        let dynamicPip = false;
        window.setPipMode = (active) => {
            dynamicPip = active;
            updateCameraFraming(document.body.clientWidth, document.body.clientHeight);
        };

        window.playGesture = (name) => {
            const n = name.toLowerCase();
            if (n.includes('greeting') || n.includes('cute') || n.includes('dance')) {
                targetEmotion = 'happy';
            } else if (n.includes('fight') || n.includes('powerful') || n.includes('shoot')) {
                targetEmotion = 'angry';
            } else if (n.includes('ready')) {
                targetEmotion = 'relaxed';
            } else if (n.includes('sad')) {
                targetEmotion = 'sad';
            } else if (n.includes('surprised')) {
                targetEmotion = 'surprised';
            } else {
                targetEmotion = 'neutral';
            }

            const action = gestures[name];
            if (!action || !currentVrm || !idleAction) return;
            if (currentAction === action && action.isRunning()) return;

            if (currentAction && currentAction !== idleAction) {
                currentAction.fadeOut(0.3);
            }

            // For the 'talk' gesture, we might want it to loop if we're still speaking
            if (name === 'talk') {
                action.setLoop(THREE.LoopRepeat);
            } else {
                action.setLoop(THREE.LoopOnce);
            }

            action.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(0.3).play();
            currentAction = action;

            if (action.loop === THREE.LoopOnce) {
                const duration = action.getClip().duration;
                setTimeout(() => {
                    if (currentAction === action) {
                        idleAction.reset().fadeIn(0.5).play();
                        action.fadeOut(0.5);
                        currentAction = idleAction;
                    }
                }, (duration * 1000) - 300);
            }
        };

        window.processKeywords = (text) => {
            const lower = text.toLowerCase();
            if (lower.includes('dance')) window.playGesture('dance');
            else if (lower.includes('hello') || lower.includes('hi ')) window.playGesture('greeting');
            else if (lower.includes('fight')) window.playGesture('fight');
            else if (lower.includes('cute')) window.playGesture('cute');
            else if (lower.includes('spin')) window.playGesture('spin');
            else if (lower.includes('ready')) window.playGesture('ready');
        };

        // --- RESTORED: Optimized Dynamic Framing Engine (Commit b85d7370) ---
        let avatarMetrics = { height: 1.5, width: 0.8, centerX: -0.15, headY: 1.45 };
        let userZoomOffset = 0; // Pinch-to-zoom offset
        let initialPinchDistance = 0;
        
        function updateCameraFraming(containerWidth, containerHeight) {
            if (!containerWidth || !containerHeight) return;
            
            camera.aspect = containerWidth / containerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(containerWidth, containerHeight, false); 
            
            const urlParams = new URLSearchParams(window.location.search);
            const isOverlay = urlParams.get('overlay') === 'true';
            const isPip = (urlParams.get('pip') === 'true') || dynamicPip;

            if (isPip) {
                // ── PIP: Full-body framing ──
                // Show the entire 1.6m avatar inside the small 3:4 PiP window.
                // We need enough camera distance so the vertical FoV covers
                // the model height plus some breathing room (10% margin).
                const PIP_MARGIN = 1; // 15% breathing room
                const halfFov = (camera.fov * Math.PI) / 360;
                const tanHalf = Math.tan(halfFov);
                // Distance so the full height fits vertically
                const pipDist = (avatarMetrics.height * PIP_MARGIN) / (2 * tanHalf);
                targetCameraZ = pipDist;
                // Look at the vertical center of the model (feet=0, head=1.6)
                const lookY = avatarMetrics.height * 0.5;
                camera.position.set(0, lookY, targetCameraZ);
                camera.lookAt(0, lookY, 0);
                return;
            }

            // RESTORED: Exact ZOOM and PAN logic for main app / overlay
            const ZOOM_FACTOR = isOverlay ? 2.5 : 1.5; 
            const PAN_Y_OFFSET = isOverlay ? 0.5 : 0.15; 
            const tanFov = Math.tan((camera.fov * Math.PI) / 360); 
            
            let distHeight = avatarMetrics.height / (2 * tanFov);
            let distWidth = 0;
            const containerAspect = camera.aspect;
            if (containerAspect < 0.6) {
                 distWidth = avatarMetrics.width / (2 * tanFov * containerAspect);
            }
            
            let baseDist = Math.max(distHeight, distWidth) / ZOOM_FACTOR;
            targetCameraZ = baseDist + userZoomOffset;
            
            const frameCenterY = (baseDist * tanFov) - (avatarMetrics.height * (isOverlay ? 0.4 : 0.5)) - PAN_Y_OFFSET;
            avatarMetrics.centerY = frameCenterY; // Cache for orbit rotation
            
            // ELEVATED TILT: Raise the camera slightly but keep it pointing at the original center
            const cameraY = frameCenterY + 0.35; 
            
            camera.position.set(avatarMetrics.centerX, cameraY, targetCameraZ);
            camera.lookAt(avatarMetrics.centerX, frameCenterY, 0);
        }

        let lastHeight = 0;
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const w = entry.contentRect.width;
                const h = entry.contentRect.height;
                if (Math.abs(h - lastHeight) > 100 || lastHeight === 0) {
                    updateCameraFraming(w, h);
                    lastHeight = h;
                }
            }
        });
        resizeObserver.observe(document.body);

        // --- RESTORED: Interactive Gaze Tracking + Phase 12 Timeout ---
        let targetLookX = 0;
        let targetLookY = 0;
        let currentLookX = 0;
        let currentLookY = 0;
        let lastGazeTime = -100;

        window.setTapTarget = (screenX, screenY) => {
            // Map screen tap to targetLookX/Y normalized range
            // Intuitively: Y-up is negative LookY (looking up), Y-down is positive LookY (looking down)
            targetLookX = (screenX / window.innerWidth) * 2 - 1;
            targetLookY = (screenY / window.innerHeight) * 2 - 1 + 0.35; // Bias for middle-tap LOOK DOWN
            
            // INCREASED RANGE: allow looking further down
            targetLookX = Math.max(-0.8, Math.min(0.8, targetLookX));
            targetLookY = Math.max(-0.8, Math.min(0.8, targetLookY));
            lastGazeTime = clock.elapsedTime;
            
            console.log(`[DEBUG] Tap: screenY=${screenY}, targetLookY=${targetLookY.toFixed(2)}`);
            
            if (window.SparkleManager) {
                window.SparkleManager.spawn(screenX, screenY);
            }
            
            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Tap gaze target updated');
        };

        // ── Touch Orbit Camera (360° Y-axis rotation, auto-reset after 4s) + Pinch Zoom ──
        let orbitAngle = 0;         // Current orbit angle (radians)
        let orbitTarget = 0;        // Target angle to lerp toward
        let lastOrbitTime = -100;   // Time of last drag event
        let isDragging = false;
        let dragStartX = 0;
        const ORBIT_DRAG_SENSITIVITY = 0.01; // radians per px

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragStartX = e.touches[0].clientX;
                lastOrbitTime = clock.elapsedTime;
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDistance = Math.sqrt(dx * dx + dy * dy);
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - dragStartX;
                dragStartX = e.touches[0].clientX;
                orbitTarget += dx * ORBIT_DRAG_SENSITIVITY;
                lastOrbitTime = clock.elapsedTime;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                const delta = dist - initialPinchDistance;
                userZoomOffset -= delta * 0.01; // Pinch sensitivity
                userZoomOffset = Math.max(-1.5, Math.min(3.0, userZoomOffset)); // Clamp zoom range
                
                initialPinchDistance = dist;
                updateCameraFraming(document.body.clientWidth, document.body.clientHeight);
            }
        }, { passive: true });

        document.addEventListener('touchend', () => {
            isDragging = false;
            lastOrbitTime = clock.elapsedTime;
        }, { passive: true });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) return; // Don't update gaze while orbiting
            targetLookX = (e.clientX / window.innerWidth) * 2 - 1;
            targetLookY = -(e.clientY / window.innerHeight) * 2 + 1;
            targetLookX = Math.max(-0.6, Math.min(0.6, targetLookX));
            targetLookY = Math.max(-0.6, Math.min(0.6, targetLookY));
            lastGazeTime = clock.elapsedTime;
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVrm) {
                if (mixer) mixer.update(delta);
                if (window.SparkleManager) window.SparkleManager.update(delta);


                currentCameraZ = THREE.MathUtils.lerp(currentCameraZ, targetCameraZ, delta * 3.0);

                // ── Orbit Camera Update (polar coords around avatar Y axis) ──
                const urlParamsAnim = new URLSearchParams(window.location.search);
                const isOverlayAnim = urlParamsAnim.get('overlay') === 'true' || dynamicPip;
                if (!isOverlayAnim) {
                    // Auto-reset orbit to front after 4 seconds of inactivity
                    const timeSinceOrbit = clock.elapsedTime - lastOrbitTime;
                    if (!isDragging && timeSinceOrbit > 4.0) {
                        orbitTarget = THREE.MathUtils.lerp(orbitTarget, 0, delta * 2.0);
                    }
                    orbitAngle = THREE.MathUtils.lerp(orbitAngle, orbitTarget, delta * 4.0);

                    // Polar orbit: camera circles avatar at constant radius
                    const camY = camera.position.y; // keep existing height
                    camera.position.x = Math.sin(orbitAngle) * currentCameraZ + avatarMetrics.centerX;
                    camera.position.z = Math.cos(orbitAngle) * currentCameraZ;
                    camera.lookAt(avatarMetrics.centerX, avatarMetrics.centerY || camY, 0); // PRESERVE TILT
                } else {
                    camera.position.z = currentCameraZ;
                }

                const time = clock.elapsedTime;

                // --- RESTORED: Procedural Layered Animation Matrix (Airi-Style) ---
                const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');
                const upperChest = currentVrm.humanoid.getNormalizedBoneNode('upperChest');
                const neck = currentVrm.humanoid.getNormalizedBoneNode('neck');
                const head = currentVrm.humanoid.getNormalizedBoneNode('head');

                // GAZE TIMEOUT: Return to zero after 4 seconds OR if a gesture is playing
                const isGesturePlaying = currentAction && currentAction !== idleAction;
                const isGazing = (time - lastGazeTime) < 4.0 && !isGesturePlaying;
                const finalTargetX = isGazing ? targetLookX : 0;
                const finalTargetY = isGazing ? targetLookY : 0;

                currentLookX = THREE.MathUtils.lerp(currentLookX, finalTargetX, delta * 4.0);
                currentLookY = THREE.MathUtils.lerp(currentLookY, finalTargetY, delta * 4.0);

                // 1. Procedural Breathing (Absolute assignment to prevent infinite rotation accumulation)
                const breathOsc = Math.sin(time * 1.5); 
                if (upperChest) upperChest.rotation.x = breathOsc * 0.015;
                if (spine) {
                    spine.rotation.z = Math.sin(time * 0.8) * 0.005;
                    spine.rotation.y = currentLookX * 0.25; // No -= accumulation to fix 360 spin glitch
                }

                // 2. Saccadic Neck & Head Micro-Movements + Gaze Tracking
                const saccadeX = Math.sin(time * 2.1) * Math.sin(time * 1.3 + 1.0);
                const saccadeY = Math.sin(time * 1.7) * Math.cos(time * 2.5 + 2.0);
                
                if (head) {
                    head.rotation.set(0, 0, 0); 
                    // Intuitive: +currentLookY (bottom tap) results in +X rotation (tilts head DOWN)
                    head.rotation.y = (saccadeX * 0.02) + currentLookX * 0.6;
                    head.rotation.x = (saccadeY * 0.015) + (currentLookY * 0.6); 
                    
                    if (isThinking) {
                        head.rotation.z += Math.sin(time * 1.5) * 0.01; 
                        head.rotation.x += Math.sin(time * 0.8) * 0.02;
                    }
                    head.rotation.y = Math.max(-0.8, Math.min(0.8, head.rotation.y));
                    head.rotation.x = Math.max(-0.9, Math.min(0.9, head.rotation.x)); 
                }
                if (neck) {
                    neck.rotation.set(0, 0, 0);
                    neck.rotation.y = (saccadeX * 0.01) + currentLookX * 0.15;
                    neck.rotation.x = (currentLookY * 0.3); 
                }
                
                // 3. Saccadic Eye Darting -> removed per request to stop erratic eye overriding

                // Smooth Blinking
                const blinkPeriod = Math.sin(time * 2.5) + Math.sin(time * 3.1);
                const targetBlink = blinkPeriod > 1.85 ? 1.0 : 0.0;
                const currentBlink = currentVrm.expressionManager.getValue('blink') || 0;
                const blinkLerp = targetBlink > currentBlink ? 0.6 : 0.2;
                currentVrm.expressionManager.setValue('blink', THREE.MathUtils.lerp(currentBlink, targetBlink, blinkLerp));

                // Emotion Blending
                const names = Object.keys(currentVrm.expressionManager.expressionMap);
                for (const emotion of ['happy', 'angry', 'sad', 'relaxed', 'surprised']) {
                    if (names.includes(emotion)) {
                        const target = (emotion === targetEmotion && speechIntensity < 0.6) ? 0.6 : 0.0;
                        const currentVal = currentVrm.expressionManager.getValue(emotion) || 0;
                        currentVrm.expressionManager.setValue(emotion, THREE.MathUtils.lerp(currentVal, target, 0.05));
                    }
                }

                // Dynamic Visemes
                const visemes = ['aa', 'ih', 'ee', 'oh', 'ou'];
                const availableVisemes = visemes.filter(v => names.includes(v));
                if (speechIntensity > 0) {
                    mouthTime += delta;
                    const volumeJitter = 0.8 + 0.2 * Math.sin(time * 20);
                    const effectiveIntensity = Math.min(1.0, speechIntensity * volumeJitter * 1.5);
                    
                    if (availableVisemes.length > 0) {
                        let targetViseme = '';
                        if (effectiveIntensity > 0.6) {
                            targetViseme = Math.sin(mouthTime * 15) > 0 ? 'aa' : 'oh';
                        } else if (effectiveIntensity > 0.2) {
                            targetViseme = Math.sin(mouthTime * 10) > 0 ? 'ih' : 'ee';
                        } else {
                            targetViseme = 'ou';
                        }
                        for (const v of availableVisemes) {
                            const target = (v === targetViseme) ? effectiveIntensity : 0;
                            const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                            const lerpFactor = target > currentVal ? 0.6 : 0.4;
                            currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, target, lerpFactor));
                        }
                    } else if (names.includes('mouthOpen')) {
                        const currentVal = currentVrm.expressionManager.getValue('mouthOpen') || 0;
                        currentVrm.expressionManager.setValue('mouthOpen', THREE.MathUtils.lerp(currentVal, effectiveIntensity, 0.5));
                    }
                } else {
                    mouthTime = 0.0;
                    for (const v of visemes) {
                        const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                        if (currentVal > 0) {
                            currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, 0, 0.3));
                        }
                    }
                    if (names.includes('mouthOpen')) {
                        const cur = currentVrm.expressionManager.getValue('mouthOpen') || 0;
                        currentVrm.expressionManager.setValue('mouthOpen', THREE.MathUtils.lerp(cur, 0, 0.3));
                    }
                }

                // 4. Ambient Wind Engine
                if (currentVrm.springBoneManager) {
                    const windX = Math.sin(time * 0.7) * 0.5 + Math.sin(time * 1.3) * 0.5;
                    const windZ = Math.cos(time * 0.5) * 0.5 + Math.sin(time * 1.1) * 0.5;
                    const windGust = (Math.sin(time * 0.3) + 1.0) * 0.5;
                    const windForce = new THREE.Vector3(windX, 0, windZ).normalize();
                    const gravityPower = 0.5 + (windGust * 1.0);
                    currentVrm.springBoneManager.joints.forEach(joint => {
                        joint.settings.gravityDir.set(windForce.x * 0.5, -1, windForce.z * 0.5).normalize();
                        joint.settings.gravityPower = gravityPower;
                    });
                }
                currentVrm.update(delta);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
