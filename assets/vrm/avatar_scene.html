<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:;">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clawa VRM</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
    <script>
        // esmsInitOptions MUST be set before es-module-shims loads.
        // Without shimMode: true, the polyfill may skip importmap processing on older Android WebViews.
        window.esmsInitOptions = { shimMode: true };
    </script>
    <!-- IMPORTANT: No 'async' here — must be synchronous so importmap is processed before type=module -->
    <script src="./lib/es-module-shims.js"></script>
    <script type="importmap-shim">
    {
        "imports": {
            "three": "./lib/three.module.js",
            "three/addons/": "./lib/",
            "@pixiv/three-vrm": "./lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "./lib/three-vrm-animation.module.js"
        }
    }
    </script>
</head>

<body>
    <script>
        // Intercept global errors to bubble up to Flutter for diagnostics!
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const errorMsg = 'ERROR: ' + msg + ' @ ' + url + ':' + lineNo + ':' + columnNo;
            console.error(errorMsg);
            if (window.ClawaBridge) {
                window.ClawaBridge.postMessage(errorMsg);
            }
            return false;
        };

        // Also catch unhandled promise rejections
        window.addEventListener('unhandledrejection', function (event) {
            const msg = 'ERROR (Promise): ' + (event.reason ? event.reason.toString() : 'Unknown rejection');
            console.error(msg);
            if (window.ClawaBridge) {
                window.ClawaBridge.postMessage(msg);
            }
        });

        // Early probe to confirm Bridge is active
        (function () {
            const probe = () => {
                if (window.ClawaBridge) {
                    window.ClawaBridge.postMessage('LOG: [JS] Bridge Probe Successful');
                } else {
                    setTimeout(probe, 100);
                }
            };
            probe();
        })();
    </script>
    <script type="module-shim">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';
        import { createVRMAnimationClip, VRMAnimationLoaderPlugin } from '@pixiv/three-vrm-animation';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0.0, 1.35, 2.2);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        let diagnosticCube = null;
        // DIAGNOSTIC CUBE: If you see a spinning glowing red cube, WebGL is WORKING!
        const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
        const material = new THREE.MeshStandardMaterial({
            color: 0xff0000,
            emissive: 0xff0000,
            emissiveIntensity: 0.5
        });
        diagnosticCube = new THREE.Mesh(geometry, material);
        diagnosticCube.position.set(0.2, 1.7, 0.1); // Shifted slightly to be visible next to head
        scene.add(diagnosticCube);
        if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Diagnostic Cube Added and Visible');

        let currentVrm = null;
        let mixer = null;
        let idleAction = null;
        let talkAction = null;
        let currentAction = null;

        let speechIntensity = 0.0;
        let isSpeaking = false;
        let mouthTime = 0.0;
        let isThinking = false;

        let targetCameraZ = 2.2;
        let currentCameraZ = 2.2;

        window.loadVrmAvatar = (avatarFileName) => {
            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Starting load of ' + avatarFileName);

            const loader = new GLTFLoader();
            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] Registering VRM Plugins...');
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            loader.load('./' + avatarFileName,
                (gltf) => {
                    if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: [JS] ' + avatarFileName + ' loaded successfully');

                    if (currentVrm) {
                        scene.remove(currentVrm.scene);
                        currentVrm.dispose();
                    }

                    const vrm = gltf.userData.vrm;
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

                    mixer = new THREE.AnimationMixer(vrm.scene);

                    // Load VRMA Animations sequentially
                    if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: Loading VRMA animations...');
                    loader.load('./animations/idle_loop.vrma', (vrmaGltf) => {
                        const vrmAnimation = vrmaGltf.userData.vrmAnimations[0];
                        const clip = createVRMAnimationClip(vrmAnimation, vrm);
                        idleAction = mixer.clipAction(clip);
                        idleAction.play();
                        currentAction = idleAction;

                        loader.load('./animations/gesture_elegant.vrma', (talkGltf) => {
                            const talkAnim = talkGltf.userData.vrmAnimations[0];
                            const tClip = createVRMAnimationClip(talkAnim, vrm);
                            talkAction = mixer.clipAction(tClip);
                            talkAction.setLoop(THREE.LoopRepeat); // Important so talking repeats!
                            isThinking = false;

                            if (window.ClawaBridge) window.ClawaBridge.postMessage('LOG: VRMA setup complete');
                        }, undefined, (err) => {
                            if (window.ClawaBridge) window.ClawaBridge.postMessage('ERROR: gesture_elegant failed: ' + err);
                        });
                    }, undefined, (err) => {
                        if (window.ClawaBridge) window.ClawaBridge.postMessage('ERROR: idle_loop failed: ' + err);
                    });
                },
                (progress) => {
                    if (window.ClawaBridge && progress.total > 0) {
                        const percent = (progress.loaded / progress.total * 100).toFixed(1);
                        window.ClawaBridge.postMessage('LOG: [JS] Loading ' + avatarFileName + ': ' + percent + '%');
                        window.ClawaBridge.postMessage('PROGRESS:' + (progress.loaded / progress.total));
                    }
                },
                (err) => {
                    console.error(err);
                    if (window.ClawaBridge) window.ClawaBridge.postMessage('ERROR: [JS] loading ' + avatarFileName + ': ' + err);
                }
            );
        };

        // Signal flutter bridge that the static JS engine is online and ready
        if (window.ClawaBridge) window.ClawaBridge.postMessage('READY');

        const clock = new THREE.Clock();

        window.setSpeechIntensity = (intensity) => {
            speechIntensity = intensity;
            const wasSpeaking = isSpeaking;
            isSpeaking = intensity > 0.1;

            if (isSpeaking && !wasSpeaking && talkAction) {
                // Crossfade to talking animation
                talkAction.reset();
                talkAction.play();
                if (idleAction) idleAction.crossFadeTo(talkAction, 0.3, true);
                currentAction = talkAction;
            } else if (!isSpeaking && wasSpeaking && idleAction) {
                // Crossfade back to idle animation
                idleAction.reset();
                idleAction.play();
                if (talkAction) talkAction.crossFadeTo(idleAction, 0.5, true);
                currentAction = idleAction;
            }
        };

        window.setThinking = (thinking) => {
            isThinking = thinking;
        };

        window.setCinematicMode = (active) => {
            targetCameraZ = active ? 1.0 : 2.2;
        };

        window.setGlowIntensity = (intensity) => {
            if (diagnosticCube) {
                diagnosticCube.material.emissiveIntensity = 0.5 + (intensity * 2.0);
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVrm) {
                if (mixer) mixer.update(delta);

                currentCameraZ = THREE.MathUtils.lerp(currentCameraZ, targetCameraZ, delta * 3.0);
                camera.position.z = currentCameraZ;

                const time = clock.elapsedTime;

                // Keep the head sway for thinking state since VRMA animations just loop
                if (isThinking) {
                    const head = currentVrm.humanoid.getNormalizedBoneNode('head');
                    if (head) {
                        // Blend additive thinking motion on top of base animation
                        head.rotation.z += Math.sin(time * 2.0) * 0.02 + 0.02;
                        head.rotation.x += Math.sin(time) * 0.02 + 0.02;
                    }
                }

                // Blinking logic
                const blinkPeriod = Math.sin(time * 2.5) + Math.sin(time * 3.1);
                const blinkState = blinkPeriod > 1.85 ? 1.0 : 0.0;
                currentVrm.expressionManager.setValue('blink', blinkState);

                // Advanced Lip sync with 8Hz oscillation and lerp from speech intensity
                const visemes = ['aa', 'ih', 'ou'];
                if (speechIntensity > 0) {
                    mouthTime += delta;
                    // Create an 8Hz oscillation wave (0 to 1)
                    const osc = (Math.sin(mouthTime * 8 * Math.PI) + 1) / 2;
                    // Scale by speech intensity for dynamic envelope bounds
                    const intensity = (0.2 + 0.8 * osc) * speechIntensity;

                    // Cycle through vowels
                    const idx = Math.floor((mouthTime * 1000) / 180) % visemes.length;
                    const currentViseme = visemes[idx];

                    for (const v of visemes) {
                        const target = v === currentViseme ? intensity : 0;
                        const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                        // Smoothly lerp towards the target
                        currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, target, 0.4));
                    }
                    currentVrm.expressionManager.setValue('neutral', 0);
                } else {
                    mouthTime = 0.0; // Reset
                    for (const v of visemes) {
                        const currentVal = currentVrm.expressionManager.getValue(v) || 0;
                        if (currentVal > 0) {
                            currentVrm.expressionManager.setValue(v, THREE.MathUtils.lerp(currentVal, 0, 0.2));
                        }
                    }
                    if (!isThinking) currentVrm.expressionManager.setValue('neutral', 1.0);
                }

                currentVrm.update(delta);
            }

            if (diagnosticCube) {
                diagnosticCube.rotation.x += 0.01;
                diagnosticCube.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
