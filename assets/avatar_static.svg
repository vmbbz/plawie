<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dotted background pattern -->
    <pattern id="dottedBg" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#1a1a1a"/>
      <circle cx="2" cy="2" r="1.5" fill="#2d2d2d" opacity="0.6"/>
      <circle cx="8" cy="8" r="1.5" fill="#2d2d2d" opacity="0.6"/>
      <circle cx="2" cy="8" r="1" fill="#333333" opacity="0.4"/>
      <circle cx="8" cy="2" r="1" fill="#333333" opacity="0.4"/>
    </pattern>
    
    <!-- Head gradient -->
    <radialGradient id="headGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="70%" style="stop-color:#f5f5f5;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:0.85" />
    </radialGradient>
    
    <!-- Lightning gradient -->
    <linearGradient id="lightningGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6bb6ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="lightningGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with dotted pattern -->
  <rect width="200" height="200" fill="url(#dottedBg)"/>
  
  <!-- Avatar head (larger, centered) -->
  <circle cx="100" cy="85" r="55" fill="url(#headGradient)" filter="url(#glow)"/>
  
  <!-- Head highlight/shadow for depth -->
  <ellipse cx="100" cy="85" rx="52" ry="50" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="100" cy="90" rx="48" ry="46" fill="#000000" opacity="0.05"/>
  
  <!-- Eyes (bigger, more expressive) -->
  <g id="eyes">
    <!-- Left eye -->
    <ellipse cx="80" cy="75" rx="12" ry="15" fill="#1a1a1a"/>
    <ellipse cx="83" cy="72" rx="5" ry="6" fill="#ffffff"/>
    <ellipse cx="84" cy="71" rx="2" ry="2.5" fill="#1a1a1a"/>
    
    <!-- Right eye -->
    <ellipse cx="120" cy="75" rx="12" ry="15" fill="#1a1a1a"/>
    <ellipse cx="117" cy="72" rx="5" ry="6" fill="#ffffff"/>
    <ellipse cx="116" cy="71" rx="2" ry="2.5" fill="#1a1a1a"/>
  </g>
  
  <!-- Mouth (cuter, bigger smile) -->
  <path d="M 82 105 Q 100 115 118 105" 
        stroke="#1a1a1a" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Cheek blush (subtle) -->
  <ellipse cx="65" cy="90" rx="8" ry="6" fill="#ffb3ba" opacity="0.2"/>
  <ellipse cx="135" cy="90" rx="8" ry="6" fill="#ffb3ba" opacity="0.2"/>
  
  <!-- Lightning bolt feet (animated style but static) -->
  <g id="lightningFeet">
    <!-- Left lightning bolt -->
    <g transform="translate(70, 145) rotate(-20)">
      <path d="M 0 0 L 12 0 L 6 12 L 15 12 L 3 30 L 12 12 L 3 12 Z" 
            fill="url(#lightningGradient)" 
            stroke="#2c5aa0" 
            stroke-width="1" 
            filter="url(#lightningGlow)"/>
      <!-- Lightning details -->
      <path d="M 6 0 L 6 12 M 3 12 L 12 12" 
            stroke="#ffffff" 
            stroke-width="0.8" 
            opacity="0.6"/>
    </g>
    
    <!-- Right lightning bolt -->
    <g transform="translate(118, 145) rotate(20)">
      <path d="M 0 0 L 12 0 L 6 12 L 15 12 L 3 30 L 12 12 L 3 12 Z" 
            fill="url(#lightningGradient)" 
            stroke="#2c5aa0" 
            stroke-width="1" 
            filter="url(#lightningGlow)"/>
      <!-- Lightning details -->
      <path d="M 6 0 L 6 12 M 3 12 L 12 12" 
            stroke="#ffffff" 
            stroke-width="0.8" 
            opacity="0.6"/>
    </g>
  </g>
  
  <!-- Subtle shadow under avatar -->
  <ellipse cx="100" cy="175" rx="45" ry="10" fill="#000000" opacity="0.3"/>
  
  <!-- Extra sparkles around lightning -->
  <g id="sparkles">
    <circle cx="60" cy="160" r="1.5" fill="#6bb6ff" opacity="0.8"/>
    <circle cx="140" cy="165" r="1" fill="#6bb6ff" opacity="0.6"/>
    <circle cx="75" cy="155" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="125" cy="162" r="0.8" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
